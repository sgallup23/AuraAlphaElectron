name: Build & Release Electron App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
            arch: --arm64
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Catches the "stale dist/" failure mode that caused the 2026-04-27
      # trading-page crash: index.html was referencing chunks that didn't
      # exist on disk. This step fails the build before electron-builder
      # packages a broken asar.
      - name: Verify dist integrity
        run: node scripts/verify-dist-integrity.js

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap

  package-gpu-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Build pack
        run: |
          set -eu
          mkdir -p out
          cp -r grid_worker pack
          find pack -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find pack -name '*.pyc' -delete
          printf '{"version":"%s"}\n' "${{ steps.ver.outputs.v }}" > pack/VERSION.json
          cd pack && zip -r "../out/AuraAlphaGridWorker_${{ steps.ver.outputs.v }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: release-gpu-pack
          path: out/*.zip

  publish:
    needs: [build, package-gpu-pack]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-windows-latest/*
            artifacts/release-macos-latest/*
            artifacts/release-ubuntu-latest/*
            artifacts/release-gpu-pack/*
          generate_release_notes: true
          # Prevent the "Not Found / delete-release-asset" 404 that failed
          # v9.4.0's publish step when a partial draft already existed.
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
