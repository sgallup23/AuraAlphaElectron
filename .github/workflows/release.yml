name: Build & Release Electron App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
            arch: --arm64
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Catches the "stale dist/" failure mode that caused the 2026-04-27
      # trading-page crash: index.html was referencing chunks that didn't
      # exist on disk. This step fails the build before electron-builder
      # packages a broken asar.
      - name: Verify dist integrity
        run: node scripts/verify-dist-integrity.js

      # SSL.com eSigner cloud signing — Windows only.
      # Requires repo secrets: ESIGNER_USERNAME, ESIGNER_PASSWORD,
      # ESIGNER_TOTP_SECRET, ESIGNER_CREDENTIAL_ID. If unset, builds skip
      # signing via AURA_SKIP_SIGN=1 (matches the pre-2026-05-18 behaviour).
      - name: Setup Java 11 (for CodeSignTool)
        if: matrix.platform == 'win'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install SSL.com CodeSignTool
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $tooldir = "$env:USERPROFILE\CodeSignTool"
          $zip = "$env:RUNNER_TEMP\CodeSignTool.zip"
          Invoke-WebRequest -Uri 'https://www.ssl.com/download/codesigntool-for-windows/' -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $tooldir -Force
          # Do NOT flatten — the sign-with-esigner.js hook walks up to 3 levels
          # to find conf/code_sign_tool.properties and uses that dir as cwd.
          # The earlier flatten step incorrectly hoisted conf/* up by one level
          # when the zip had no wrapper dir, breaking CodeSignTool's
          # cwd-relative `.\conf\code_sign_tool.properties` lookup.
          "CODESIGNTOOL_DIR=$tooldir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "CodeSignTool extracted to: $tooldir"
          $props = Get-ChildItem -Path $tooldir -Recurse -Filter 'code_sign_tool.properties' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($props) {
            Write-Host "  located conf at: $($props.FullName)"
          } else {
            Write-Error "code_sign_tool.properties not found under $tooldir — sign hook will fail"
            exit 1
          }

      - name: Build Electron app
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "win" && -z "${ESIGNER_USERNAME}" ]]; then
            echo "::warning::No ESIGNER_* secrets configured — building unsigned"
            export AURA_SKIP_SIGN=1
          fi
          npx electron-builder --${{ matrix.platform }} ${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
          ESIGNER_PASSWORD: ${{ secrets.ESIGNER_PASSWORD }}
          ESIGNER_TOTP_SECRET: ${{ secrets.ESIGNER_TOTP_SECRET }}
          ESIGNER_CREDENTIAL_ID: ${{ secrets.ESIGNER_CREDENTIAL_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap

  package-gpu-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Build pack
        run: |
          set -eu
          mkdir -p out
          cp -r grid_worker pack
          find pack -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find pack -name '*.pyc' -delete
          printf '{"version":"%s"}\n' "${{ steps.ver.outputs.v }}" > pack/VERSION.json
          cd pack && zip -r "../out/AuraAlphaGridWorker_${{ steps.ver.outputs.v }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: release-gpu-pack
          path: out/*.zip

  publish:
    needs: [build, package-gpu-pack]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-windows-latest/*
            artifacts/release-macos-latest/*
            artifacts/release-ubuntu-latest/*
            artifacts/release-gpu-pack/*
          generate_release_notes: true
          # Prevent the "Not Found / delete-release-asset" 404 that failed
          # v9.4.0's publish step when a partial draft already existed.
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
