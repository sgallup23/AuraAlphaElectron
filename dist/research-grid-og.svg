<?xml version="1.0" encoding="UTF-8"?>
<!--
  Aura Research Grid — Open Graph card template (1200×630)
  This SVG is the SOURCE. Generate the production PNG:
    inkscape research-grid-og.svg -o research-grid-og.png -w 1200 -h 630
  or via npx:
    npx svg-png-converter research-grid-og.svg research-grid-og.png 1200 630
  Then update SEO ogImage prop in ResearchGridPage.jsx to point at the PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#1a1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g fill="#A78BFA" opacity="0.10">
    <circle cx="100" cy="120" r="3"/><circle cx="180" cy="120" r="3"/><circle cx="260" cy="120" r="3"/>
    <circle cx="100" cy="200" r="3"/><circle cx="180" cy="200" r="3"/><circle cx="260" cy="200" r="3"/>
    <circle cx="940" cy="430" r="3"/><circle cx="1020" cy="430" r="3"/><circle cx="1100" cy="430" r="3"/>
    <circle cx="940" cy="510" r="3"/><circle cx="1020" cy="510" r="3"/><circle cx="1100" cy="510" r="3"/>
  </g>

  <!-- Top brand row -->
  <text x="80" y="100" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#A78BFA" letter-spacing="2">AURA ALPHA</text>
  <rect x="80" y="118" width="60" height="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="80" y="240" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="76" font-weight="700" fill="#FFFFFF">Research Grid</text>

  <!-- Subtitle -->
  <text x="80" y="295" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="28" font-weight="400" fill="#9CA3AF">Distributed quant backtesting + ML training</text>
  <text x="80" y="335" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="28" font-weight="400" fill="#9CA3AF">on Aura&apos;s contributor fleet</text>

  <!-- Stats strip -->
  <rect x="80" y="400" width="1040" height="100" rx="12" fill="#1F1B33" stroke="#3B3450" stroke-width="1"/>

  <text x="125" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9CA3AF">THROUGHPUT</text>
  <text x="125" y="475" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#34D399">7,200+ jobs/hr</text>

  <text x="395" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9CA3AF">LIFETIME COMPLETED</text>
  <text x="395" y="475" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#60A5FA">4.1M jobs</text>

  <text x="665" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9CA3AF">PROMOTED LIVE</text>
  <text x="665" y="475" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#FBBF24">2,848 strats</text>

  <text x="935" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9CA3AF">FROM</text>
  <text x="935" y="475" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#A78BFA">$49/mo</text>

  <!-- Footer URL -->
  <text x="80" y="585" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#6B7280">auraalpha.cc/research-grid</text>
</svg>
